name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r sidecar/requirements.txt --no-cache-dir
        
      - name: build sidecar binary
        shell: bash
        run: |
          set -euxo pipefail

          # Determine the target triplet for Tauri
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            TARGET="aarch64-apple-darwin"
          elif [ "${{ matrix.platform }}" == "windows-latest" ]; then
            TARGET="x86_64-pc-windows-msvc"
          else
            TARGET="x86_64-unknown-linux-gnu"
          fi

          echo "Building sidecar for $TARGET..."
          mkdir -p src-tauri/bin

          cd sidecar
          python -m PyInstaller --clean --noconfirm --onefile \
            --name "cloaklm-sidecar-$TARGET" \
            --collect-all docling \
            --collect-all docling_core \
            --collect-all docling_parse \
            --collect-all gliner \
            --collect-all uvicorn \
            --collect-all fastapi \
            --collect-all onnxruntime \
            --collect-all tokenizers \
            --collect-all torch \
            --collect-all rich \
            --collect-all huggingface_hub \
            --collect-all safetensors \
            --hidden-import transformers \
            --hidden-import tokenizers \
            --hidden-import tokenizers.tokenizers \
            --hidden-import onnxruntime.capi.onnxruntime_pybind11_state \
            --hidden-import onnxruntime.capi._pybind_state \
            --copy-metadata docling-ibm-models \
            --copy-metadata docling \
            --copy-metadata docling-core \
            --copy-metadata docling-parse \
            server.py

          echo "=== PyInstaller dist output ==="
          ls -la dist/

          mv "dist/cloaklm-sidecar-$TARGET"* "../src-tauri/bin/"
          cd ..

      - name: verify sidecar binary exists
        shell: bash
        run: |
          echo "=== Contents of src-tauri/bin/ ==="
          ls -la src-tauri/bin/

          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            TARGET="aarch64-apple-darwin"
          elif [ "${{ matrix.platform }}" == "windows-latest" ]; then
            TARGET="x86_64-pc-windows-msvc"
          else
            TARGET="x86_64-unknown-linux-gnu"
          fi

          EXPECTED="src-tauri/bin/cloaklm-sidecar-$TARGET"
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            EXPECTED="${EXPECTED}.exe"
          fi

          if [ ! -f "$EXPECTED" ]; then
            echo "ERROR: Sidecar binary not found at $EXPECTED"
            exit 1
          fi

          echo "Sidecar binary verified: $EXPECTED ($(du -h "$EXPECTED" | cut -f1))"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        
      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0.5.24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose
          tagName: ${{ github.ref_name }} # the action automatically creates a release for this tag
          releaseName: 'CloakLM ${{ github.ref_name }}'
          releaseBody: |
            ### CloakLM v0.3.0 — The Hardened Update
            
            This release brings major security and usability improvements:
            
            *   **🛡️ Secure Storage**: API keys are now stored in an encrypted local keystore rather than plain-text localStorage.
            *   **🕰️ Chat History**: Your conversations are now automatically persisted locally and can be reloaded via the new History menu.
            *   **✨ Unified Branding**: Integrated the official CloakLM logo across the application UI and OS icons.
            *   **🔌 Dynamic Backend**: The Python sidecar now binds to dynamic ports and scrubs logs to ensure zero PII leakage during local processing.
            *   **🐛 Fixed Bug**: Resolved an issue where reloading chat history caused a blank screen due to date parsing.
            
            **Note:** This version still requires the sidecar environment to be present.
          releaseDraft: false
          prerelease: false
